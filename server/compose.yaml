services:
  # GoバックエンドAPIサーバー
  api:
    build:
      context: ./
      dockerfile: Dockerfile
    container_name: task_manager_api
    ports:
      - "8080:8080"
    volumes:
      - ./data:/app/data
      - ./uploads:/app/uploads
    environment:
      - PORT=8080
      - DATABASE_PATH=/app/data/tasks.db
      - JWT_SECRET=${JWT_SECRET:-default-secret-change-in-production}
      - SMTP_HOST=mailhog
      - SMTP_PORT=1025
      - MAIL_FROM=noreply@taskmanager.local
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS:-*}
      - DEBUG=${DEBUG:-false}
    depends_on:
      - mailhog
    networks:
      - task_manager_network
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "--no-verbose",
          "--tries=1",
          "--spider",
          "http://localhost:8080/uploads/",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # MailHog（開発用メールサーバー）
  mailhog:
    image: mailhog/mailhog:v1.0.1
    container_name: task_manager_mailhog
    ports:
      - "1025:1025" # SMTP
      - "8025:8025" # WebUI
    networks:
      - task_manager_network
    restart: unless-stopped
    environment:
      - MH_STORAGE=memory

networks:
  task_manager_network:
    driver: bridge

volumes:
  data:
  uploads:
