# ビルド設定ファイル
targets:
  $default:
    builders:
      # Riverpod code generation
      riverpod_generator:
        generate_for:
          - lib/**/*.dart
        options:
          # Riverpod生成オプション
          
      # Freezed code generation
      freezed:
        generate_for:
          - lib/**/*.dart
        options:
          # Freezed生成オプション
          
      # JSON serialization
      json_serializable:
        generate_for:
          - lib/**/*.dart
        options:
          any_map: true
          checked: true
          create_to_json: true
          disallow_unrecognized_keys: false
          explicit_to_json: true
          
      # Retrofit code generation
      retrofit_generator:
        generate_for:
          - lib/**/*.dart
        options:
          # Retrofit生成オプション

